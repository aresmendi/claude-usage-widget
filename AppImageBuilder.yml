version: 1

script:
  - pip3 install --prefix="${APPDIR}/usr" \
      pystray==0.19.5 Pillow==10.4.0 browser-cookie3==0.19.1 \
      customtkinter==5.2.2 plyer==2.1.0 requests==2.32.3

AppDir:
  path: ./AppDir

  app_info:
    id: com.github.claude-usage-widget
    name: Claude Usage Widget
    icon: claude-usage-widget
    version: "1.0.0"
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/lib/python3/dist-packages/widget/main.py $@"

  apt:
    arch: x86_64
    sources:
      - sourceline: "deb [arch=x86_64] http://archive.ubuntu.com/ubuntu/ jammy main"
        key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3b4fe6acc0b21f32"
    include:
      - python3
      - python3-pip
      - libnotify-bin     # notify-send para notificaciones
      - libglib2.0-0      # requerido por pystray/GLib
    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme

  files:
    include:
      - usr/bin/python3
    exclude:
      - usr/share/doc
      - usr/share/man
      - usr/share/locale

  runtime:
    env:
      PYTHONPATH: "$APPDIR/usr/lib/python3/dist-packages"

# Nota: requiere AppIndicator GNOME Shell Extension en el sistema del usuario.
# Ver README.md sección "Requisito GNOME".

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
